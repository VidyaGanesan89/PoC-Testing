# Test Configuration Properties

# Application URLs
# Set to about:blank so UITestBase does not pre-navigate to any site.
# Every test class is responsible for navigating to its own URL.
# (Original value: https://parcelpro3.ams1907.com — kept in LanguageSelectTest / ContactUsTest which navigate themselves.)
base.url=about:blank
global.page.url=https://www.parcelpro.com/us/en/global.html

# Browser Configuration
browser=chrome
headless=false

# Timeout Settings (in seconds)
implicit.wait=10
explicit.wait=30
page.load.timeout=60

# Test Data
initial.language=United States - English
select.another.country=Select Another Country or Territory
asia.continent=Asia & India Subcontinent
india.english=India – English

# Reporting
screenshot.on.failure=true
report.path=test-output/reports
