# Test Report Configuration
# This file stores the configuration for test report generation

# ===== FILE GENERATION PATHS =====
# Test files directory (relative to project root)
test.files.directory=src/test/java/parcelprotests

# Page object files directory (relative to project root)
pageobject.files.directory=src/test/java/pageobjects

# ===== SCREENSHOT CONFIGURATION =====
# Screenshot output directory (relative to project root)
screenshot.directory=functional test screenshots

# Screenshot file name pattern
# Available placeholders: {stepNumber}, {timestamp}
screenshot.filename.pattern=Step{stepNumber}_{timestamp}.png

# ===== REPORT CONFIGURATION =====
# Report output directory (relative to project root)
report.output.directory=functional test report

# Report file name pattern
# Available placeholders: {timestamp}, {date}, {time}
report.filename.pattern=Test_Report_{timestamp}

# Auto-open report after generation (true/false)
report.auto.open=true

# Report format (html, xml, both)
report.format=html

# TestNG surefire reports location
testng.reports.directory=target/surefire-reports

# Email report generation (true/false)
email.report.enabled=true
email.report.suffix=_email

# ===== BACKEND API CONFIGURATION =====
# Backend server port
backend.server.port=8080

# RAG server port
rag.server.port=8081

# Frontend server port
frontend.server.port=3000

